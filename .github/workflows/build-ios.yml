name: Build iOS IPA

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Flutter iOS
        run: flutter build ios --release --no-codesign 2>&1 || true

      - name: Find Runner.app location
        run: |
          echo "=== Searching for Runner.app ==="
          find build/ios -name "Runner.app" -type d 2>/dev/null || echo "No Runner.app found"
          echo "=== build/ios contents ==="
          ls -la build/ios/ 2>/dev/null || echo "build/ios does not exist"
          echo "=== build/ios subdirs ==="
          find build/ios -maxdepth 3 -type d 2>/dev/null || echo "No subdirs"

      - name: Build with xcodebuild (unsigned)
        run: |
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/ios/xc \
            -destination 'generic/platform=iOS' \
            ARCHS=arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found anywhere"
            find build/ios -maxdepth 5 -type d
            exit 1
          fi
          echo "Found Runner.app at: $APP_PATH"
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r LifeOS.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LifeOS-iOS
          path: build/ios/ipa/LifeOS.ipa
