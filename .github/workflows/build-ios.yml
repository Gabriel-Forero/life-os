name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Patch project for unsigned build
        run: |
          cd ios/Runner.xcodeproj
          # Disable code signing in all build configs
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = ""/g' project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = ""/g' project.pbxproj
          sed -i '' '/DEVELOPMENT_TEAM/s/= .*/= "";/' project.pbxproj
          # Add CODE_SIGNING_ALLOWED = NO to all configs
          sed -i '' 's/INFOPLIST_FILE/CODE_SIGNING_ALLOWED = NO;\n\t\t\t\tINFOPLIST_FILE/g' project.pbxproj

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r LifeOS.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LifeOS-iOS
          path: build/ios/ipa/LifeOS.ipa
