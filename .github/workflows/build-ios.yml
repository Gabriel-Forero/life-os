name: Build iOS IPA

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Flutter iOS (ignore signing error)
        run: flutter build ios --release --no-codesign 2>&1 || true

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found at $APP_PATH"
            ls -la build/ios/iphoneos/ 2>/dev/null || echo "Directory does not exist"
            exit 1
          fi
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r LifeOS.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LifeOS-iOS
          path: build/ios/ipa/LifeOS.ipa
