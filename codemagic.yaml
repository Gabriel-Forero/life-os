workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: 3.35.7
      xcode: latest
      ios_signing:
        distribution_type: development
        bundle_identifier: com.lifeos.lifeOs
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Generate Drift code
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa

  android-build:
    name: Android Build
    max_build_duration: 20
    instance_type: mac_mini_m2
    environment:
      flutter: 3.35.7
      java: 17
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Generate Drift code
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
